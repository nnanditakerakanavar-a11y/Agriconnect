{% extends 'base.html' %}

{% block content %}

<h2 style="text-align:center; color:#2e7d32;">Place Order</h2>

<div style="
    max-width:400px;
    margin:30px auto;
    background:#fff;
    padding:20px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
">

    <h3 style="text-align:center;">
        {{ product.name }}
    </h3>

    <p><b>Price:</b> ₹{{ product.price }}</p>

    <p>
        <b>Available Quantity:</b>
        {{ product.quantity }} {{ product.unit }}
    </p>

    {% if error %}
        <p style="color:red; text-align:center;">
            {{ error }}
        </p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <!-- Quantity -->
        <label><b>Quantity</b></label>
        <input type="number" name="quantity" value="1" min="1" max="{{ product.quantity }}"
            style="width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

        <!-- Unit -->
        <label><b>Unit</b></label>
        <select name="unit"
            style="width:100%; padding:10px; margin-bottom:15px; border-radius:10px;">
            <option value="kg">kg</option>
            <option value="g">g</option>
        </select>

        <!-- 🆕 Customer Details -->
        <label><b>Full Name</b></label>
        <input type="text" name="name" required
            style="width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

        <label><b>Phone Number</b></label>
        <input type="text" name="phone" required
            style="width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

        <label><b>Address</b></label>
        <textarea name="address" required
            style="width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ccc;"></textarea>

        <label><b>City</b></label>
        <input type="text" name="city" required
            style="width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

        <label><b>Pincode</b></label>
        <input type="text" name="pincode" required
            style="width:100%; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ccc;">

        <!-- Submit -->
        <button type="submit"
            style="
                width:100%;
                background:yellow;
                color:black;
                font-weight:bold;
                padding:12px;
                border:none;
                border-radius:20px;
                cursor:pointer;
                transition:0.3s;
            ">
            Place Order
        </button>

    </form>

</div>

{% endblock %}
